name: Daily Coin Price Update

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch coin prices
        run: python scripts/fetch_coin_prices.py --days 1

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coins/ data/coins-summary.json
          git diff --staged --quiet || git commit -m "🪙 Coin price update $(date -u +%Y-%m-%d)"
          git push
